name: Static Analysis

on: pull_request

jobs:
  check:
    name: Slither
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        shell: devenv shell bash -- -e {0}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v16
        with:
          name: devenv

      - name: Install devenv
        shell: bash
        run: nix profile add nixpkgs#devenv

      - name: Run Slither
        id: slither
        continue-on-error: true
        run: slither . --fail-medium 2>&1 | tee slither-output.txt

      - name: Wrap output
        shell: bash
        run: .github/scripts/make-pr-comment.sh "${{ steps.slither.outcome }}" slither-output.txt slither-comment.md

      - name: Comment PR
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          path: slither-comment.md

      - name: Fail on findings
        if: steps.slither.outcome == 'failure'
        run: exit 1
