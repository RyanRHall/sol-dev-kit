name: Foundry

permissions: {}

on: pull_request

jobs:
  check:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v16
        with:
          name: devenv

      - name: Install devenv
        run: nix profile add nixpkgs#devenv

      - name: Activate devenv
        run: |
          eval "$(devenv print-dev-env)"
          echo "PATH=$PATH" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: forge soldeer install

      - name: Generate coverage report
        run: forge coverage -v --no-match-coverage "(script|test|mocks)" --report lcov
        id: coverage

      - name: Report code coverage
        uses: zgosalvez/github-actions-report-lcov@a546f89a65a0cdcd82a92ae8d65e74d450ff3fbc # v4.1.4
        with:
          # update-comment: true TODO - add access token so that action can comment with coverage report
          coverage-files: lcov.info
          minimum-coverage: 8
